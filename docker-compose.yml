services:
  studiowebux-landing:
    build: .
    image: localhost:5000/studiowebux:latest
    container_name: studiowebux-landing
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - VIRTUAL_HOST=studiowebux.com,www.studiowebux.com
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=studiowebux.com,www.studiowebux.com
    networks:
      - proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "25M"

networks:
  proxy:
    name: proxy
    external: true
